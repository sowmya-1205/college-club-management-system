{% extends "layout.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-4 text-center">
            <img src="{{ profile.profile_picture.url }}" class="img-fluid rounded-circle mb-3" style="width: 150px; height: 150px; object-fit: cover;" alt="Profile Picture">
            <h4>{{ user.username }}</h4>
            <p class="text-muted">{{ user.email }}</p>
        </div>
        <div class="col-md-8">
            <h3>Update Your Profile</h3>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
