{% extends "layout.html" %}

{% block content %}
<div class="mb-3">
    <a href="{% url 'clubs1:home' %}" class="btn btn-primary">Back to Home</a>
    <a href="{% url 'clubs1:club_detail' club.id %}" class="btn btn-outline-secondary">View Club Page</a>
    <img src="{% static 'pics/nitgate.png' %}" alt="Placeholder" class="img-fluid mt-2" style="max-width: 200px;"/>
</div>
<div class="container mt-4">
    <h1 class="text-center">{{ club.name }}</h1>

    <!-- Display Club Image -->
    {% if club.image %}
        <div class="text-center">
            <img src="{{ club.image.url }}" alt="{{ club.name }}" class="img-fluid rounded" style="max-width: 300px; height: auto;">
        </div>
    {% endif %}

    <!-- Navigation Links -->
    <ul class="nav nav-tabs mt-4">
        <li class="nav-item">
            <a class="nav-link active" href="{% url 'clubs1:club_detail' club.id %}">Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{% url 'clubs1:club_detail' club.id %}#announcements">Announcements</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{% url 'clubs1:manage_club_members' club.id %}">Members</a>
        </li>
    </ul>

    <!-- Home Section -->
    <div class="mt-3">
        <h3>About {{ club.name }}</h3>
        <p>{{ club.description }}</p>
    </div>
</div>
{% endblock %}
