{% extends 'layout.html' %}

{% block title %}Request Club Head Role{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow rounded p-4">
        <h2 class="mb-4 text-primary">Request Club Head Access</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="club_name" class="form-label">Club Name</label>
                <input type="text" class="form-control" id="club_name" name="club_name" required>
            </div>

            <div class="mb-3">
                <label for="message" class="form-label">Why do you want to be the club head?</label>
                <textarea class="form-control" id="message" name="message" rows="4" placeholder="Optional message..."></textarea>
            </div>

            <button type="submit" class="btn btn-success">Submit Request</button>
        </form>

        <div class="mt-3">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
